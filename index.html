<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muchas gracias por tu compra!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* VARIABLES CSS ADAPTADAS A LA MARCA:
           Extraídas directamente de la paleta de colores de tus imágenes.
        */
        :root {
            --bg-color: #931a1a;        /* El color rojo vino/guinda del fondo exterior */
            --card-bg: #ffffff;         /* Fondo blanco de la tarjeta central con esquinas redondeadas */
            --primary-color: #111111;   /* Negro puro para el texto de expectación y botón principal */
            --text-main: #000000;       
            --text-muted: #333333;      
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; /* Reducido para dar más margen vertical en pantallas chicas */
        }

        /* TARJETA CONTENEDORA ADAPTADA:
           Cambiamos a un flujo con 'gap' fijo para controlar exactamente el aire entre elementos
           y evitar que se dispersen a lo largo de la pantalla.
        */
        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px; /* Un poco más estrecho para estilizar en móviles */
            padding: 30px 25px; /* Reducimos el padding vertical de 45px a 30px */
            border-radius: 45px; /* Ajustado proporcionalmente al nuevo tamaño */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* 🔥 LA CLAVE: Une todos los elementos con una separación fija de 20px */
        }

        /* LOGO PRINCIPAL:
           Reducimos su tamaño máximo en móvil para que no empuje el resto de los componentes.
        */
        .brand-logo {
            width: 85%; /* No ocupa todo el ancho, dejando aire elegante a los lados */
            max-width: 240px;
            height: auto;
            margin-bottom: 5px;
        }

        /* ILUSTRACIÓN COMING SOON:
           Se escala de forma más compacta para equilibrar el peso visual central.
        */
        .coming-soon-img {
            width: 70%;
            max-width: 180px;
            height: auto;
            margin-bottom: 5px;
        }

        /* FRASE DE EXPECTATIVA:
           Reducimos los márgenes exteriores innecesarios ya que el contenedor maneja el gap.
        */
        .appointment-text {
            font-size: 0.95rem; /* Un pelín más pequeña para mejorar legibilidad en pantallas compactas */
            font-weight: 600; /* Un poco más de peso para que resalte */
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0; /* Eliminamos el margin-bottom de 30px que causaba desfase */
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* SECCIÓN DE CONTACTO:
           Se acopla de forma natural al cierre de la tarjeta.
        */
        .contact-section {
            width: 100%;
            border-top: 1px solid #f5f5f5;
            padding-top: 15px; /* Espaciado interno superior más compacto */
        }

        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .btn-contact:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Imagen 1: El Logo de Kavana -->
        <img src="logo.jpeg" alt="Kavana Logo" class="brand-logo">
        
        <!-- Imagen 2: Ilustración del chico en el vaso ("Coming Soon") -->
        <img src="coming-soon.jpeg" alt="Kavana Coming Soon" class="coming-soon-img">
        
        <!-- Texto final de cita misteriosa -->
        <p class="appointment-text">Tu y yo<br>tenemos una cita el jueves....</p>
        
        <!-- Sección de interacción por WhatsApp -->
        <div class="contact-section">
            <a href="https://wa.me/522294501817?text=Hola,%20esto%20es%20una%20prueba." target="_blank" class="btn-contact">
                💬 Contactar por WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
