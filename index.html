<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muchas gracias por tu compra!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* VARIABLES CSS ADAPTADAS A LA MARCA:
           Extraídas directamente de la paleta de colores de tus imágenes.
        */
        :root {
            --bg-color: #931a1a;        /* El color rojo vino/guinda del fondo exterior */
            --card-bg: #ffffff;         /* Fondo blanco de la tarjeta central con esquinas redondeadas */
            --primary-color: #111111;   /* Negro puro para el texto de expectación y botón principal */
            --text-main: #000000;       
            --text-muted: #333333;      
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 15px; /* Un poco más de espacio en los bordes */
        }

        /* TARJETA CONTENEDORA:
           Ahora emula perfectamente el contenedor blanco de bordes muy redondeados de la tercera imagen.
        */
        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px; 
            padding: 45px 30px 35px 30px;
            border-radius: 60px; /* Bordes altamente redondeados idénticos al diseño proporcionado */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO PRINCIPAL (Imagen 1):
           Se ajusta automáticamente al ancho sin perder proporción.
        */
        .brand-logo {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 10px;
        }

        /* ILUSTRACIÓN COMING SOON (Imagen 2):
           Controlamos su tamaño máximo para que no desplace el resto del contenido en pantallas chicas.
        */
        .coming-soon-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 25px;
        }

        /* FRASE DE EXPECTATIVA:
           Estilo limpio, con tipografía delgada, mayúsculas y el subrayado inferior del diseño original.
        */
        .appointment-text {
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-main);
            line-height: 1.8;
            margin-bottom: 30px;
            text-decoration: underline;
            text-underline-offset: 5px; /* Separa sutilmente la línea del texto para que se vea estético */
        }

        .contact-section {
            width: 100%;
            border-top: 1px solid #eeeeee; /* Línea divisoria muy sutil */
            padding-top: 25px;
        }

        /* BOTÓN DE CONTACTO PREMIUM:
           Cambiado a color negro con texto blanco para hacer match con el estilo minimalista de Kavana.
        */
        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .btn-contact:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Imagen 1: El Logo de Kavana -->
        <img src="logo.png" alt="Kavana Logo" class="brand-logo">
        
        <!-- Imagen 2: Ilustración del chico en el vaso ("Coming Soon") -->
        <img src="coming-soon.png" alt="Kavana Coming Soon" class="coming-soon-img">
        
        <!-- Texto final de cita misteriosa -->
        <p class="appointment-text">Tu y yo<br>tenemos una cita el jueves....</p>
        
        <!-- Sección de interacción por WhatsApp -->
        <div class="contact-section">
            <a href="https://wa.me/522294501817?text=Hola,%20esto%20es%20una%20prueba." target="_blank" class="btn-contact">
                💬 Contactar por WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
