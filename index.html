<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muchas gracias por tu compra!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="0">
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

    <style>
        :root {
            --bg-color: #931a1a;        
            --card-bg: #ffffff;         
            --primary-color: #111111;   
            --text-main: #000000;       
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; 
            overflow: hidden; 
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px; 
            padding: 25px 25px; 
            border-radius: 55px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; 
        }

        .brand-logo {
            width: 90%;
            max-width: 320px;
            height: auto;
            margin-bottom: 2px; 
        }

        .appointment-text {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--text-main);
            line-height: 1.5;
            text-decoration: underline;
            text-underline-offset: 5px;
            margin-bottom: 4px;
        }

        .info-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            line-height: 1.5;
            color: #222222;
            margin: 2px 0;
        }
        .info-text .location {
            font-weight: 700;
        }
        .info-text .hours {
            font-weight: 400;
            color: #555555;
        }

        /* ESTILO PARA LA SEMILLA ILUSTRADA */
        .character-img {
            max-height: 85px; 
            width: auto;
            opacity: 0.85; 
            margin: 2px 0;
            animation: bounce 3s ease-in-out infinite; 
        }

        .contact-section {
            width: 100%;
            border-top: 1px solid #f0f0f0;
            padding-top: 12px; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .btn-kavana {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent; 
        }

        .btn-menu {
            background-color: var(--bg-color);
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(147, 26, 26, 0.2);
        }

        .btn-secondary {
            background-color: var(--primary-color);
            color: #ffffff;
        }

        .btn-text-wrapper {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
            width: 100%;
        }

        .action-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .action-desc {
            font-size: 0.75rem;
            font-weight: 400;
            color: #cccccc; 
        }

        .btn-kavana:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .btn-kavana:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo de Kavana -->
        <img src="logo.jpeg" alt="Kavana Logo" class="brand-logo">
        
        <!-- Frase de expectativa -->
        <p class="appointment-text">Intenciona tus mañanas con<br>café Kavana</p>

        <!-- Semilla DEBAJO de la frase -->
        <img src="semilla.jpeg" alt="Kavana Personaje" class="character-img">
        
        <!-- Información de horario -->
        <div class="info-text">
            <p class="location">Horario de atención:</p>
            <p class="hours">8:30am - 5:00pm</p>
        </div>
        
        <!-- Sección con la estructura de 3 botones -->
        <div class="contact-section">
            <a href="menu.html" class="btn-kavana btn-menu">Ver Menú Digital</a>
            
            <a href="https://wa.me/522294501817?text=Hola%20KAVANA!%20Me%20gustaria%20hacer%20un%20pedido." target="_blank" class="btn-kavana btn-secondary">
                <div class="btn-text-wrapper">
                    <span class="action-title">Contactar por WhatsApp</span>
                    <span class="action-desc">Realiza tu pedido aquí</span>
                </div>
            </a>
            
            <a href="https://www.instagram.com/kavana_coffee?utm_source=qr&igsh=MXNjMGplNnpoeWc0cw==" target="_blank" class="btn-kavana btn-secondary">
                <div class="btn-text-wrapper">
                    <span class="action-title">Síguenos en Instagram</span>
                    <span class="action-desc">Conoce nuestras promociones</span>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
