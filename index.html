<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muchas gracias por tu compra!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #931a1a;        
            --card-bg: #ffffff;         
            --primary-color: #111111;   
            --text-main: #000000;       
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; 
            overflow: hidden; 
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px; 
            padding: 35px 25px;
            border-radius: 55px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
        }

        .brand-logo {
            width: 95%;
            max-width: 340px;
            height: auto;
            margin-bottom: 10px; /*CLAVE: Crea la ligera separación entre ambas imágenes */
        }

        .coming-soon-img {
            width: 80%;
            max-width: 280px;
            height: auto;
        }

        .appointment-text {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-main);
            line-height: 1.6;
            text-decoration: underline;
            text-underline-offset: 5px;
        }

        .info-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            line-height: 1.5;
            color: #222222;
            margin: 15px 0; /* CLAVE: Crea un espacio limpio arriba y abajo del horario */
        }
        .info-text .location {
            font-weight: 700;
        }
        .info-text .hours {
            font-weight: 400;
            color: #555555;
        }

        /* SECCIÓN DE CONTACTO LADO A LADO */
        .contact-section {
            width: 100%;
            border-top: 1px solid #f0f0f0;
            padding-top: 25px; /* CLAVE: Separa los botones un renglón más hacia abajo */
            display: flex;
            flex-direction: row; 
            gap: 12px; 
        }

        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 10px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1; /* Hace que ambos botones midan exactamente lo mismo (50% del espacio útil) */
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .btn-contact:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpeg" alt="Kavana Logo" class="brand-logo">
        <img src="coming-soon.jpeg" alt="Kavana Coming Soon" class="coming-soon-img">
        <p class="appointment-text">Tu y yo<br>tenemos una cita el jueves....</p>
        
        <div class="info-text">
            <p class="location">Torre exertia</p>
            <p class="hours">8:00am - 5:00pm</p>
        </div>
        
        <!-- Botones distribuidos horizontalmente -->
        <div class="contact-section">
            <a href="https://wa.me/522294501817?text=Hola,%20esto%20es%20una%20prueba." target="_blank" class="btn-contact">
                💬 WhatsApp
            </a>
            <a href="https://www.instagram.com/kavana_coffee?utm_source=qr&igsh=MXNjMGplNnpoeWc0cw==" target="_blank" class="btn-contact">
                Instagram
            </a>
        </div>
    </div>

</body>
</html>

</body>
</html>
