<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muchas gracias por tu compra!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #931a1a;        /* Rojo vino/guinda corporativo de Kavana */
            --card-bg: #ffffff;         /* Fondo blanco de la tarjeta */
            --primary-color: #111111;   /* Negro para el botón */
            --text-main: #000000;       
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* EL CUERPO: Centra la tarjeta y asegura que el fondo guinda se vea arriba y abajo */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px; /* Espacio arriba y abajo para que la tarjeta flote en el fondo rojo */
        }

        /* LA TARJETA CENTRAL: 
           Quitamos cualquier propiedad elástica. 'height: auto' hace que se adapte al contenido.
        */
        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 430px; /* Ancho ideal idéntico al flyer original */
            padding: 35px 25px;
            border-radius: 55px; /* Bordes altamente redondeados tal como la imagen objetivo */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            
            /* Caja de contenido unificada */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO PRINCIPAL: Más grande y con menos margen inferior */
        .brand-logo {
            width: 90%;
            max-width: 340px;
            height: auto;
            margin-bottom: -10px; /* Ajuste sutil para pegar el logo a la ilustración */
        }

        /* ILUSTRACIÓN COMING SOON: 
           Incrementamos su tamaño para que domine el centro del diseño, igual que el flyer original.
        */
        .coming-soon-img {
            width: 85%;
            max-width: 310px;
            height: auto;
            margin-bottom: 25px;
        }

        /* FRASE DE EXPECTATIVA */
        .appointment-text {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 25px;
            text-decoration: underline;
            text-underline-offset: 5px;
        }

        /* SECCIÓN DEL BOTÓN */
        .contact-section {
            width: 100%;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }

        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s;
            width: 100%;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .btn-contact:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Imagen 1: El Logo de Kavana -->
        <img src="logo.jpeg" alt="Kavana Logo" class="brand-logo">
        
        <!-- Imagen 2: Ilustración del chico en el vaso ("Coming Soon") -->
        <img src="coming-soon.jpeg" alt="Kavana Coming Soon" class="coming-soon-img">
        
        <!-- Texto final de cita misteriosa -->
        <p class="appointment-text">Tu y yo<br>tenemos una cita el jueves....</p>
        
        <!-- Sección de interacción por WhatsApp -->
        <div class="contact-section">
            <a href="https://wa.me/522294501817?text=Hola,%20esto%20es%20una%20prueba." target="_blank" class="btn-contact">
                💬 Contactar por WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
